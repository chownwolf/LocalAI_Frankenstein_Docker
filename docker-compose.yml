    volumes:
      - models:/models
      - ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        MODEL_NAME="groq-tool-8b"
        GGUF_FILE="/models/Llama-3-Groq-8B-Tool-Use-Q5_K_M.gguf"
        if [ ! -f "$$GGUF_FILE" ]; then
          echo "ERROR: GGUF file not found."
